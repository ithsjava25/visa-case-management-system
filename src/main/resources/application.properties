spring.application.name=visa-case-management-system
spring.docker.compose.lifecycle-management=start_only

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/visadatabase}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:secret}

# application.properties (default/test/prod)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

minio.endpoint=http://localhost:9000
minio.accessKey=admin
minio.secretKey=password
minio.bucketName=visa-documents
minio.region=eu-north-1
