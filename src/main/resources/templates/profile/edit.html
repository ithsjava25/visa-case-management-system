<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <style th:replace="~{fragments/header :: nav-style}"></style>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f0f0f0;
            line-height: 1.6;
            background: #000;
            margin: 0;
            padding: 0;
        }

        .page-content { padding: 40px; }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #111;
            padding: 32px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        header {
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        h1 { font-size: 24px; font-weight: 500; color: #fff; margin: 0; }
        header p { color: #666; font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
            color: #666;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #181818;
            border: 1px solid #333;
            border-radius: 6px;
            color: #ccc;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #666;
            background: #1a1a1a;
            color: #fff;
        }

        input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        ::placeholder { color: #444; }

        .btn-submit {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: 0.2s;
            margin-top: 10px;
            font-size: 15px;
        }
        .btn-submit:hover { background: #ccc; transform: translateY(-1px); }

        .cancel-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .cancel-link:hover { color: #fff; }

        .alert-error {
            background: rgba(217, 48, 37, 0.15);
            border: 1px solid rgba(217, 48, 37, 0.3);
            color: #f28b82;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .is-invalid {
            border-color: #ff4d4d !important;
        }

        .error-text {
            color: #ff4d4d;
            font-size: 0.75rem;
            margin-top: 8px;
            display: block;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: nav}"></nav>

<div class="page-content">
    <div class="container">
        <header>
            <h1>Edit Profile</h1>
            <p>Updating profile for <span th:text="${user.fullName()}">User</span></p>
        </header>

        <div th:if="${error}" class="alert-error" th:text="${error}">
            Error message
        </div>

        <form th:action="@{/profile/edit/{id}(id=${user.id()})}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullName"
                       th:value="${user.fullName()}"
                       placeholder="e.g. Anna Andersson"
                       required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email"
                       th:value="${user.email()}"
                       placeholder="you@example.com"
                       required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <input type="text"
                       th:value="${user.userAuthorization()}"
                       disabled>
            </div>
            <button type="submit" class="btn-submit">Save Changes</button>
            <a th:href="@{/profile/view/{id}(id=${user.id()})}" class="cancel-link">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
