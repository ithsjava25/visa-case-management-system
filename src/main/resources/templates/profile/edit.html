<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <style>
        /* Narrow form column. Two stacked .container cards (profile fields +
           the sysadmin-only authorization form) live inside .page-layout. */
        .page-layout { max-width: 500px; margin: 0 auto; }

        .container > header {
            display: block;               /* not a flex bar here */
            text-align: left;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        .container > header p { color: var(--color-text-dim); font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: nav}"></nav>

<div class="page-content">
    <div class="page-layout">
        <div class="container">
            <header>
                <h1>Edit Profile</h1>
                <p>Updating profile for <span th:text="${user.fullName()}">User</span></p>
            </header>

            <div th:if="${error}" class="alert-error" th:text="${error}">
                Error message
            </div>

            <form th:action="@{/profile/edit/{id}(id=${user.id()})}" method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullName"
                           th:value="${user.fullName()}"
                           placeholder="e.g. Anna Andersson"
                           required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email"
                           th:value="${user.email()}"
                           placeholder="you@example.com"
                           required>
                </div>
                <!-- Read-only role display for any viewer who can't change it
                     (the user themselves, or any non-sysadmin). Sysadmins viewing
                     someone else's profile get the editable form below instead. -->
                <div class="form-group" th:if="${!canChangeAuthorization}">
                    <label>Role</label>
                    <input type="text"
                           th:value="${user.userAuthorization()}"
                           disabled>
                </div>
                <button type="submit" class="btn-submit">Save Changes</button>
                <a th:href="@{/profile/view/{id}(id=${user.id()})}" class="cancel-link">Cancel</a>
            </form>
        </div>

        <!-- Sysadmin-only: change another user's authorization. Posts to a separate
             endpoint so it produces a single AUTHORIZATION_CHANGED log row instead
             of being bundled into the regular profile UPDATED row. -->
        <div class="container mt-card" th:if="${canChangeAuthorization}">
            <header>
                <h1>Authorization</h1>
                <p>Sysadmin only — change this user's role.</p>
            </header>
            <form th:action="@{/profile/edit/{id}/authorization(id=${user.id()})}" method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />
                <div class="form-group">
                    <label>Role</label>
                    <select name="newAuthorization" required>
                        <option th:each="auth : ${authorizations}"
                                th:value="${auth}"
                                th:text="${auth}"
                                th:selected="${auth == user.userAuthorization()}">USER</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Update Role</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
