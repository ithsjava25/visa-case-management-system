<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <style>
        /* profile/view's outer wrapper is a layout wrapper only — the
           .info-item tiles are the visible surfaces, not the wrapper itself. */
        .page-layout { max-width: 600px; margin: 0 auto; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: nav}"></nav>

<div class="page-content">
    <div class="page-layout">
        <a th:href="@{/}" class="back-link">&larr; Back</a>

        <header class="page-header">
            <h1 th:text="${user.fullName()}">Full Name</h1>
            <a th:if="${canEdit}"
               th:href="@{/profile/edit/{id}(id=${user.id()})}"
               class="btn-edit">Edit Profile</a>
        </header>

        <div class="info-grid">
            <div class="info-item">
                <span class="label">Full Name</span>
                <span class="value" th:text="${user.fullName()}">John Doe</span>
            </div>

            <div class="info-item">
                <span class="label">Email</span>
                <span class="value" th:text="${user.email()}">john@example.com</span>
            </div>

            <div class="info-item">
                <span class="label">Role</span>
                <span class="value">
                    <span class="role-badge"
                          th:classappend="${'role-' + #strings.toLowerCase(user.userAuthorization().name())}"
                          th:text="${user.userAuthorization()}">USER</span>
                </span>
            </div>

            <div class="info-item">
                <span class="label">User ID</span>
                <span class="value" th:text="${user.id()}">1</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
