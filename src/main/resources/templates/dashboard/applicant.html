<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style th:replace="~{fragments/header :: nav-style}"></style>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f0f0f0;
            line-height: 1.6;
            background: #000;
            margin: 0;
            padding: 0;
        }

        .page-content { padding: 40px; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            box-shadow: 0 8px 16px -2px rgba(0, 0, 0, 0.6);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 24px;
            margin-bottom: 40px;
        }

        h1 { font-size: 24px; font-weight: 500; color: #fff; margin: 0; }

        .subtitle { font-size: 14px; color: #888; margin-top: 4px; }

        /* Table */
        table { width: 100%; border-collapse: collapse; }

        th {
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #666;
            padding: 12px 16px;
            border-bottom: 1px solid #222;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #181818;
            font-size: 14px;
            color: #ccc;
            border-left: 2px solid transparent;
            transition: all 0.2s;
        }

        tr:hover td { background: rgba(30, 30, 30, 0.4); }
        tr:hover td:first-child { border-left: 2px solid #fff; }

        /* Status badges */
        .status-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .status-submitted  { background: rgba(25, 103, 210, 0.2); color: #8ab4f8; }
        .status-unassigned { background: rgba(80, 80, 80, 0.3);   color: #999; }
        .status-assigned   { background: rgba(0, 150, 136, 0.2);  color: #80cbc4; }
        .status-incomplete { background: rgba(176, 96, 0, 0.2);   color: #fdd663; }
        .status-granted    { background: rgba(30, 126, 52, 0.2);  color: #81c995; }
        .status-rejected   { background: rgba(217, 48, 37, 0.15); color: #f28b82; }

        /* Actions */
        .view-link {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }
        .view-link:hover { color: #888; text-decoration: underline; }

        /* Empty state */
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #555;
        }
        .empty-state p { margin: 0 0 20px; font-size: 15px; }
        .btn-apply {
            display: inline-block;
            color: #fff;
            background: #222;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            text-decoration: none;
            border: 1px solid #333;
            transition: all 0.2s;
        }
        .btn-apply:hover { background: #333; transform: translateY(-1px); }

        /* Rejection reason row */
        .rejection-note {
            font-size: 13px;
            color: #f28b82;
            padding: 10px 16px 14px;
            border-bottom: 1px solid #181818;
        }
        .rejection-note strong { color: #f28b82; }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: nav}"></nav>

<div class="page-content">
    <div class="container">
        <header>
            <div>
                <h1>Your Applications</h1>
                <p class="subtitle">Welcome back, <span th:text="${name}">Applicant</span></p>
            </div>
        </header>

        <main>
            <!-- Empty state -->
            <div th:if="${visas.isEmpty()}" class="empty-state">
                <p>You haven't submitted any visa applications yet.</p>
                <a href="#" class="btn-apply">Apply for a Visa</a>
            </div>

            <!-- Applications table -->
            <table th:if="${!visas.isEmpty()}">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Visa Type</th>
                    <th>Nationality</th>
                    <th>Status</th>
                    <th>Handler</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="visa : ${visas}">
                    <tr>
                        <td th:text="${visa.id()}">1</td>
                        <td th:text="${visa.visaType()}">Work Visa</td>
                        <td th:text="${visa.nationality()}">Sweden</td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="${'status-' + #strings.toLowerCase(visa.visaStatus().name())}"
                                  th:text="${visa.visaStatus()}">SUBMITTED</span>
                        </td>
                        <td>
                            <span th:if="${visa.handlerId() != null}" th:text="${visa.handlerId()}">1</span>
                            <span th:if="${visa.handlerId() == null}" style="color: #555;">Unassigned</span>
                        </td>
                        <td style="text-align: right;">
                            <a href="#" class="view-link">View &rarr;</a>
                        </td>
                    </tr>
                    <!-- Rejection reason inline under the row -->
                    <tr th:if="${visa.visaStatus().name() == 'REJECTED' and visa.rejectionReason() != null}">
                        <td colspan="6" class="rejection-note">
                            <strong>Rejection reason:</strong>
                            <span th:text="${visa.rejectionReason()}"></span>
                        </td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </main>
    </div>
</div>

</body>
</html>
