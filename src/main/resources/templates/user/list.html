<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <style th:replace="~{fragments/header :: nav-style}"></style>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f0f0f0;
            line-height: 1.6;
            background: #000;
            margin: 0;
            padding: 0;
        }

        .page-content { padding: 40px; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            box-shadow: 0 8px 16px -2px rgba(0, 0, 0, 0.6);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 24px;
            margin-bottom: 40px;
        }

        h1 { font-size: 24px; font-weight: 500; color: #fff; margin: 0; }

        .user-count {
            font-size: 14px;
            color: #888;
        }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #666;
            padding: 12px 16px;
            border-bottom: 1px solid #222;
        }
        td {
            padding: 16px;
            border-bottom: 1px solid #181818;
            font-size: 14px;
            color: #ccc;
            border-left: 2px solid transparent;
            transition: all 0.2s;
        }

        tr:hover td {
            background: rgba(30, 30, 30, 0.4);
        }

        tr:hover td:first-child {
            border-left: 2px solid #fff;
        }

        /* Role badges */
        .role-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .role-user { background: rgba(25, 103, 210, 0.2); color: #8ab4f8; }
        .role-admin { background: rgba(176, 96, 0, 0.2); color: #fdd663; }
        .role-sysadmin { background: rgba(128, 0, 128, 0.2); color: #d7a8ff; }

        .view-link { color: #fff; text-decoration: none; font-weight: 500; transition: 0.2s; }
        .view-link:hover { color: #888; text-decoration: underline; }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: nav}"></nav>

<div class="page-content">
    <div class="container">
        <header>
            <div>
                <h1>User Management</h1>
                <span class="user-count" th:text="${#lists.size(users) + ' users total'}">0 users total</span>
            </div>
        </header>

        <main>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id()}">1</td>
                    <td th:text="${user.fullName()}">John Doe</td>
                    <td th:text="${user.email()}">john@example.com</td>
                    <td>
                        <span class="role-badge"
                              th:classappend="${'role-' + #strings.toLowerCase(user.userAuthorization().name())}"
                              th:text="${user.userAuthorization()}">USER</span>
                    </td>
                    <td style="text-align: right;">
                        <a th:href="@{/profile/view/{id}(id=${user.id()})}" class="view-link">
                            View &rarr;
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(users)}" style="padding: 40px; text-align: center; color: #999;">
                No users found.
            </div>
        </main>
    </div>
</div>

</body>
</html>
