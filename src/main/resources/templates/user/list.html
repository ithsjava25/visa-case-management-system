<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <style>
        /* Page-specific: centered 1000px column, single card. */
        .container { max-width: 1000px; margin: 0 auto; }

        .container > header { margin-bottom: 40px; padding-bottom: 24px; }

        .user-count { font-size: 14px; color: var(--color-text-muted); }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: nav}"></nav>

<div class="page-content">
    <div class="container">
        <header>
            <div>
                <h1>User Management</h1>
                <span class="user-count" th:text="${#lists.size(users) + ' users total'}">0 users total</span>
            </div>
        </header>

        <main>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id()}">1</td>
                    <td th:text="${user.fullName()}">John Doe</td>
                    <td th:text="${user.email()}">john@example.com</td>
                    <td>
                        <span class="role-badge"
                              th:classappend="${'role-' + #strings.toLowerCase(user.userAuthorization().name())}"
                              th:text="${user.userAuthorization()}">USER</span>
                    </td>
                    <td style="text-align: right;">
                        <a th:href="@{/profile/view/{id}(id=${user.id()})}" class="view-link">
                            View &rarr;
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(users)}" class="empty-state">
                No users found.
            </div>
        </main>
    </div>
</div>

</body>
</html>
