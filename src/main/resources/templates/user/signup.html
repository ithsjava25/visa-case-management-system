<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <style>
        /* Matches login.html — anonymous page, centred card via .auth-body. */
        .container {
            max-width: 420px;
            width: 100%;
        }

        .container > header {
            text-align: center;
            display: block;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        .container > header p { color: var(--color-text-dim); font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body class="auth-body">

<div class="container">
    <header>
        <h1>Create Account</h1>
        <p>Apply for visas and track your applications</p>
    </header>

    <div th:if="${error}" class="alert-error" th:text="${error}">
        Error message
    </div>

    <form th:action="@{/user/signup}" method="post">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="fullName"
                   th:value="${fullName}"
                   placeholder="e.g. Anna Andersson"
                   required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email"
                   th:value="${email}"
                   placeholder="you@example.com"
                   required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" id="password"
                   placeholder="Min. 8 characters"
                   minlength="8"
                   required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirmPassword" id="confirmPassword"
                   placeholder="Repeat your password"
                   minlength="8"
                   required>
        </div>

        <button type="submit" class="btn-submit">Create Account</button>

        <p class="login-link">
            Already have an account? <a th:href="@{/user/login}">Sign in</a>
        </p>
    </form>
</div>

<script>
    (function () {
        const pw = document.getElementById('password');
        const cpw = document.getElementById('confirmPassword');
        if (!pw || !cpw) return;
        const form = pw.form || cpw.form;
        if (!form) return;
        form.addEventListener('submit', function (e) {
            if (pw.value !== cpw.value) {
                cpw.setCustomValidity('Passwords do not match');
                cpw.reportValidity();
                e.preventDefault();
            } else {
                cpw.setCustomValidity('');
            }
        });
    })();
</script>

</body>
</html>
