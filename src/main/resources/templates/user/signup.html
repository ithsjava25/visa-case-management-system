<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f0f0f0;
            line-height: 1.6;
            background: #000;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: #111;
            padding: 32px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        header {
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
            padding-bottom: 10px;
            text-align: center;
        }

        h1 { font-size: 24px; font-weight: 500; color: #fff; margin: 0; }
        header p { color: #666; font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
            color: #666;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #181818;
            border: 1px solid #333;
            border-radius: 6px;
            color: #ccc;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #666;
            background: #1a1a1a;
            color: #fff;
        }

        ::placeholder { color: #444; }

        .btn-submit {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: 0.2s;
            margin-top: 10px;
            font-size: 15px;
        }
        .btn-submit:hover { background: #ccc; transform: translateY(-1px); }

        .login-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .login-link a {
            color: #ccc;
            text-decoration: none;
            transition: 0.2s;
        }
        .login-link a:hover { color: #fff; }

        .alert-error {
            background: rgba(217, 48, 37, 0.15);
            border: 1px solid rgba(217, 48, 37, 0.3);
            color: #f28b82;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .is-invalid {
            border-color: #ff4d4d !important;
        }

        .error-text {
            color: #ff4d4d;
            font-size: 0.75rem;
            margin-top: 8px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Create Account</h1>
        <p>Apply for visas and track your applications</p>
    </header>

    <div th:if="${error}" class="alert-error" th:text="${error}">
        Error message
    </div>

    <form th:action="@{/user/signup}" method="post">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="fullName"
                   th:value="${fullName}"
                   placeholder="e.g. Anna Andersson"
                   required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email"
                   th:value="${email}"
                   placeholder="you@example.com"
                   required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password"
                   placeholder="Choose a password"
                   required>
        </div>

        <button type="submit" class="btn-submit">Create Account</button>

        <p class="login-link">
            Already have an account? <a th:href="@{/user/login}">Sign in</a>
        </p>
    </form>
</div>

</body>
</html>
