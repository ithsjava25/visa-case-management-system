<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f0f0f0;
            line-height: 1.6;
            background: #000;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: #111;
            padding: 32px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        header {
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
            padding-bottom: 10px;
            text-align: center;
        }

        h1 { font-size: 24px; font-weight: 500; color: #fff; margin: 0; }
        header p { color: #666; font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
            color: #666;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #181818;
            border: 1px solid #333;
            border-radius: 6px;
            color: #ccc;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #666;
            background: #1a1a1a;
            color: #fff;
        }

        ::placeholder { color: #444; }

        .btn-submit {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: 0.2s;
            margin-top: 10px;
            font-size: 15px;
        }
        .btn-submit:hover { background: #ccc; transform: translateY(-1px); }

        .signup-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .signup-link a {
            color: #ccc;
            text-decoration: none;
            transition: 0.2s;
        }
        .signup-link a:hover { color: #fff; }

        .alert-error {
            background: rgba(217, 48, 37, 0.15);
            border: 1px solid rgba(217, 48, 37, 0.3);
            color: #f28b82;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: rgba(30, 126, 52, 0.15);
            border: 1px solid rgba(30, 126, 52, 0.3);
            color: #81c995;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sign In</h1>
        <p>Visa Case Management System</p>
    </header>

    <div th:if="${param.error}" class="alert-error">
        Invalid email or password.
    </div>

    <div th:if="${param.logout}" class="alert-success">
        You have been signed out.
    </div>

    <form th:action="@{/user/login}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="username" placeholder="you@example.com" required autofocus>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn-submit">Sign In</button>

        <p class="signup-link">
            Don't have an account? <a th:href="@{/user/signup}">Sign up</a>
        </p>
    </form>
</div>

</body>
</html>
