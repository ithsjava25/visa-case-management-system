<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <style>
        /* The login page has no nav, so .auth-body centres the card. */
        .container {
            max-width: 420px;
            width: 100%;
        }

        .container > header {
            text-align: center;
            display: block;          /* override the flex default */
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        .container > header p { color: var(--color-text-dim); font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body class="auth-body">

<div class="container">
    <header>
        <h1>Sign In</h1>
        <p>Visa Case Management System</p>
    </header>

    <div th:if="${param.error}" class="alert-error">
        Invalid email or password.
    </div>

    <div th:if="${param.logout}" class="alert-success">
        You have been signed out.
    </div>

    <form th:action="@{/user/login}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="username" placeholder="you@example.com" required autofocus>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn-submit">Sign In</button>

        <p class="signup-link">
            Don't have an account? <a th:href="@{/user/signup}">Sign up</a>
        </p>
    </form>
</div>

</body>
</html>
