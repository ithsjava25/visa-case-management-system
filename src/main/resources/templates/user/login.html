<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <style>
        /* The login page has no nav, so .auth-body centres the card. */
        .container {
            max-width: 420px;
            width: 100%;
        }

        .container > header {
            text-align: center;
            display: block;          /* override the flex default */
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        .container > header p { color: var(--color-text-dim); font-size: 14px; margin-top: 5px; }

        .alert-success {
            background: rgba(30, 126, 52, 0.15);
            border: 1px solid rgba(30, 126, 52, 0.3);
            color: #81c995;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .divider {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .oauth2-btn {
            background: #fff;
            color: #000;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 10px;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: 0.2s;
            margin-top: 10px;
            font-size: 15px;
        }
        .oauth2-btn:hover { background: #ccc; transform: translateY(-1px); }
    </style>

</head>
<body class="auth-body">

<div class="container">
    <header>
        <h1>Sign In</h1>
        <p>Visa Case Management System</p>
    </header>

    <div th:if="${param.error}" class="alert-error">
        Invalid email or password.
    </div>

    <div th:if="${param.logout}" class="alert-success">
        You have been signed out.
    </div>

    <form th:action="@{/user/login}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="username" placeholder="you@example.com" required autofocus>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn-submit">Sign In</button>

        <p class="signup-link">
            Don't have an account? <a th:href="@{/user/signup}">Sign up</a>
        </p>

        <p class="divider"> - or - </p>

        <a th:href="@{/oauth2/authorization/google}">
            <button type="button" class="oauth2-btn" >
            <img th:src="@{/../../static/google-icon.svg}" alt="" width="20" height="20">
            Sign in with Google
            </button>
        </a>

    </form>

</div>

</body>
</html>
