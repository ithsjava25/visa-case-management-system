<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>System Error - Visa Management</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f0f0f0;
            line-height: 1.6;
            background: #000;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            max-width: 500px;
            width: 90%;
            padding: 40px;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            box-shadow: 0 8px 16px -2px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .error-code {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #666;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 28px;
            font-weight: 500;
            color: #fff;
            margin: 0 0 16px 0;
        }

        p {
            color: #888;
            font-size: 16px;
            margin-bottom: 32px;
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: #000;
            background: #fff;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: #ccc;
            transform: translateY(-1px);
        }

        .footer-note {
            margin-top: 24px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="error-code" th:text="${errorTitle}">⚠️Error.</div>
    <h1 th:text="${errorMessage}">Something went wrong</h1>
    <p>The action could not be completed. Please verify your request or return to the dashboard.</p>

<!--    Todo: update button wih correct redirect URL-->
    <a href="/visa/dashboard" class="btn-back">
        Return to Dashboard
    </a>

    <div class="footer-note">
        Reference ID: <span>2026-04-20</span>
    </div>

</div>

</body>
</html>
