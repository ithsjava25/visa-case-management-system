<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Error - Visa Management</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <style>
        /*
          Vertically centres the error card, minus the height of the nav bar.
          Falls back to 100vh for anonymous users (no nav rendered).
        */
        .error-stage {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--nav-height));
        }
        .error-stage.no-nav { min-height: 100vh; }

        /* A centred, padded error card — narrower than the default .container
           and with centred text. */
        .container.error-card {
            max-width: 500px;
            width: 90%;
            padding: 40px;
            text-align: center;
        }

        .error-code {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-text-dim);
            margin-bottom: 16px;
        }

        .error-card h1 {
            font-size: 28px;
            margin: 0 0 16px 0;
        }

        .error-card p {
            color: var(--color-text-muted);
            font-size: 16px;
            margin-bottom: 32px;
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: var(--color-accent-on);
            background: var(--color-accent);
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }
        .btn-back:hover {
            background: var(--color-accent-hover);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<!--
    Header is only rendered when the user is authenticated.  An anonymous user
    who lands on an error page (e.g. a 404) must not see the navigation.
-->
<th:block sec:authorize="isAuthenticated()">
    <nav th:replace="~{fragments/header :: nav}"></nav>
</th:block>

<div class="error-stage" th:classappend="${#authorization.expression('!isAuthenticated()')} ? 'no-nav' : ''">
    <div class="container error-card">
        <div class="error-code" th:text="${errorTitle ?: 'Error'}">⚠️Error.</div>
        <h1 th:text="${errorMessage ?: 'Something went wrong'}">Something went wrong</h1>
        <p>The action could not be completed. Please verify your request or return to the home page.</p>
        <!--
            Authenticated users: /home redirects to the correct role-specific endpoint.
            Anonymous users (e.g. someone who hit a 404 on a public URL): send them to the login page.
        -->
        <a sec:authorize="isAuthenticated()" th:href="@{/home}" class="btn-back">
            Return to Home
        </a>
        <a sec:authorize="!isAuthenticated()" th:href="@{/user/login}" class="btn-back">
            Go to Sign In
        </a>
    </div>
</div>

</body>
</html>
