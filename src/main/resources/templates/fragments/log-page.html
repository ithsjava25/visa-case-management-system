<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head></head>
<body>

<!--
  Fragment: logPage
  Parameters:
    title             – page heading shown in <h1> (e.g. "Visa Log")
    logPath           – bare URL path used for the filter form and pager links
                        (e.g. "/log/visa") — passed as a plain string, not a @{} expression
    logs              – Page<DTO> returned by the service
    eventTypes        – enum values for the event-type filter <select>
    selectedEventType – currently active event-type filter (nullable)
    from              – LocalDate lower-bound filter (nullable)
    to                – LocalDate upper-bound filter (nullable)
    tableHeaders      – ~{::thead} markup fragment with the page's <thead>
    tableRows         – ~{::tbody} markup fragment with the page's <tbody>
-->
<th:block th:fragment="logPage(title, logPath, logs, eventTypes, selectedEventType, from, to, tableHeaders, tableRows)">

<nav th:replace="~{fragments/header :: nav}"></nav>

<div class="page-content">
    <div class="container log-page">
        <header>
            <div>
                <h1 th:text="${title}">Log</h1>
                <span class="log-count"
                      th:text="${logs.totalElements + ' event' + (logs.totalElements == 1 ? '' : 's') + ' total'}">
                    0 events total
                </span>
            </div>
        </header>

        <!-- Filter form — GET so the resulting URL is shareable and page=N
             links can keep the rest of the query string intact. -->
        <form class="filter-bar" method="get" th:action="@{${logPath}}">
            <div class="field">
                <label for="eventType">Event type</label>
                <select id="eventType" name="eventType">
                    <option value="" th:selected="${selectedEventType == null}">All</option>
                    <option th:each="type : ${eventTypes}"
                            th:value="${type.name()}"
                            th:text="${type}"
                            th:selected="${selectedEventType != null and selectedEventType.name() == type.name()}">
                    </option>
                </select>
            </div>
            <div class="field">
                <label for="from">From</label>
                <input type="date" id="from" name="from"
                       th:value="${from != null ? #temporals.format(from, 'yyyy-MM-dd') : ''}">
            </div>
            <div class="field">
                <label for="to">To</label>
                <input type="date" id="to" name="to"
                       th:value="${to != null ? #temporals.format(to, 'yyyy-MM-dd') : ''}">
            </div>
            <div class="actions">
                <button type="submit" class="btn-submit">Apply filters</button>
                <a th:href="@{${logPath}}" class="cancel-link">Reset</a>
            </div>
        </form>

        <main>
            <table>
                <thead th:replace="${tableHeaders}"><!-- column headers --></thead>
                <tbody th:replace="${tableRows}"><!-- rows --></tbody>
            </table>

            <div th:if="${logs.totalElements == 0}" class="empty-state">
                No log entries match the current filters.
            </div>

            <!-- Pager — each link re-emits the current filter state so narrowing
                 the result set and then paging through it keeps the filters. -->
            <div class="pager" th:if="${logs.totalPages > 1}">
                <a th:if="${!logs.first}"
                   th:href="@{${logPath}(page=${logs.number - 1}, size=${logs.size},
                                        eventType=${selectedEventType != null ? selectedEventType.name() : null},
                                        from=${from != null ? #temporals.format(from, 'yyyy-MM-dd') : null},
                                        to=${to != null ? #temporals.format(to, 'yyyy-MM-dd') : null})}"
                   class="view-link">&larr; Previous</a>

                <span class="page-info"
                      th:text="'Page ' + (${logs.number} + 1) + ' of ' + ${logs.totalPages}">
                    Page 1 of 1
                </span>

                <a th:if="${!logs.last}"
                   th:href="@{${logPath}(page=${logs.number + 1}, size=${logs.size},
                                        eventType=${selectedEventType != null ? selectedEventType.name() : null},
                                        from=${from != null ? #temporals.format(from, 'yyyy-MM-dd') : null},
                                        to=${to != null ? #temporals.format(to, 'yyyy-MM-dd') : null})}"
                   class="view-link">Next &rarr;</a>
            </div>
        </main>
    </div>
</div>

</th:block>

</body>
</html>
