<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
</head>
<body>
<nav th:fragment="nav" class="site-nav">
    <a class="brand" th:href="@{/}">Visa Case Management</a>

    <div class="nav-links">
        <!-- Applicant nav: their own applications + their own profile. -->
        <th:block sec:authorize="hasRole('USER')">
            <a th:href="@{/visa/my-applications}">My Applications</a>
            <a th:href="@{/profile/view/{id}(id=${#authentication.principal.userId})}">Profile</a>
        </th:block>

        <!-- Admin nav: the case-management page + their own profile. -->
        <th:block sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/visa/cases}">Visa Cases</a>
            <a th:href="@{/profile/view/{id}(id=${#authentication.principal.userId})}">Profile</a>
        </th:block>

        <!-- Sysadmin nav: audit logs split onto their own pages, plus the
             user list, the shared admin cases page, and their own profile. -->
        <th:block sec:authorize="hasRole('SYSADMIN')">
            <a th:href="@{/log/visa}">Visa Log</a>
            <a th:href="@{/log/user}">User Log</a>
            <a th:href="@{/log/comment}">Comment Log</a>
            <a th:href="@{/log/file}">File Log</a>
            <a th:href="@{/user/list}">User List</a>
            <a th:href="@{/visa/cases}">Visa Cases</a>
            <a th:href="@{/profile/view/{id}(id=${#authentication.principal.userId})}">Profile</a>
        </th:block>

        <span class="nav-user" sec:authentication="principal.fullName">User</span>

        <form th:action="@{/user/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-signout">Sign Out</button>
        </form>
    </div>
</nav>
</body>
</html>
