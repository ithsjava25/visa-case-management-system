<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Comment Log</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>

<div th:replace="~{fragments/log-page :: logPage(
        'Comment Log',
        '/log/comment',
        ${logs},
        ${eventTypes},
        ${selectedEventType},
        ${from},
        ${to},
        ~{::thead},
        ~{::tbody})}">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Timestamp</th>
            <th>Actor User ID</th>
            <th>Visa Case ID</th>
            <th>Comment</th>
            <th>Event</th>
            <th>Description</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="log : ${logs.content}">
            <td th:text="${log.id}">1</td>
            <td th:text="${#temporals.format(log.timeStamp, 'yyyy-MM-dd HH:mm')}">2026-04-24 10:00</td>
            <td th:text="${log.actorUserId}">42</td>
            <td th:text="${log.visaCaseId}">101</td>
            <td>
                <a th:if="${log.visaCaseId != null}"
                   th:href="@{/visa/{id}(id=${log.visaCaseId})}"
                   class="view-link">View case</a>
                <span th:if="${log.visaCaseId == null}">—</span>
            </td>
            <td>
                <span class="status"
                      th:classappend="${log.commentEventType != null ? 'status-' + #strings.toLowerCase(log.commentEventType.name()) : ''}"
                      th:text="${log.commentEventType}">ADDED</span>
            </td>
            <td th:text="${log.description}">Comment added.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
