<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visa Log</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
</head>
<body>

<div th:replace="~{fragments/log-page :: logPage(
        'Visa Log',
        '/log/visa',
        ${logs},
        ${eventTypes},
        ${selectedEventType},
        ${from},
        ${to},
        ~{::thead},
        ~{::tbody})}">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Timestamp</th>
            <th>User ID</th>
            <th>Visa Case ID</th>
            <th>Event</th>
            <th>Description</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="log : ${logs.content}">
            <td th:text="${log.id}">1</td>
            <td th:text="${#temporals.format(log.timeStamp, 'yyyy-MM-dd HH:mm')}">2026-04-24 10:00</td>
            <td th:text="${log.userId}">42</td>
            <td th:text="${log.visaCaseId}">101</td>
            <td>
                <span class="status"
                      th:classappend="${log.visaEventType != null ? 'status-' + #strings.toLowerCase(log.visaEventType.name()) : ''}"
                      th:text="${log.visaEventType}">CREATED</span>
            </td>
            <td th:text="${log.description}">Visa application submitted.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
