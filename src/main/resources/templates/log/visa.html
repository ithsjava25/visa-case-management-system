<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visa Log</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <style>
        /* Log pages: single-card centred layout. The filter bar is a GET
           form so deep-linking to a filtered view works naturally and
           pagination links just append ?page=N. */
        .container { max-width: 1100px; margin: 0 auto; }
        .container > header { margin-bottom: 24px; padding-bottom: 24px; }

        .log-count { font-size: 14px; color: var(--color-text-muted); }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
        }
        .filter-bar .field  { display: flex; flex-direction: column; gap: 4px; }
        .filter-bar label   { font-size: 11px; text-transform: uppercase; color: var(--color-text-dim); }
        .filter-bar input,
        .filter-bar select  { padding: 6px 10px; font-size: 13px; }
        .filter-bar .actions { display: flex; gap: 8px; margin-left: auto; }

        .pager {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }
        .pager .page-info { font-size: 13px; color: var(--color-text-muted); }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: nav}"></nav>

<div class="page-content">
    <div class="container">
        <header>
            <div>
                <h1>Visa Log</h1>
                <span class="log-count"
                      th:text="${logs.totalElements + ' event' + (logs.totalElements == 1 ? '' : 's') + ' total'}">
                    0 events total
                </span>
            </div>
        </header>

        <!-- Filter form. GET so the resulting URL is shareable and page=N links
             can keep the rest of the query string intact. -->
        <form class="filter-bar" method="get" th:action="@{/log/visa}">
            <div class="field">
                <label for="eventType">Event type</label>
                <select id="eventType" name="eventType">
                    <option value="" th:selected="${selectedEventType == null}">All</option>
                    <option th:each="type : ${eventTypes}"
                            th:value="${type}"
                            th:text="${type}"
                            th:selected="${selectedEventType != null and selectedEventType.name() == type.name()}">
                    </option>
                </select>
            </div>
            <div class="field">
                <label for="from">From</label>
                <input type="date" id="from" name="from"
                       th:value="${from != null ? #temporals.format(from, 'yyyy-MM-dd') : ''}">
            </div>
            <div class="field">
                <label for="to">To</label>
                <input type="date" id="to" name="to"
                       th:value="${to != null ? #temporals.format(to, 'yyyy-MM-dd') : ''}">
            </div>
            <div class="actions">
                <button type="submit" class="btn-submit" style="width: auto; padding: 8px 16px;">
                    Apply filters
                </button>
                <a th:href="@{/log/visa}" class="cancel-link">Reset</a>
            </div>
        </form>

        <main>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Timestamp</th>
                    <th>User ID</th>
                    <th>Visa Case ID</th>
                    <th>Event</th>
                    <th>Description</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${logs.content}">
                    <td th:text="${log.id}">1</td>
                    <td th:text="${#temporals.format(log.timeStamp, 'yyyy-MM-dd HH:mm')}">2026-04-24 10:00</td>
                    <td th:text="${log.userId}">42</td>
                    <td th:text="${log.visaCaseId}">101</td>
                    <td>
                        <span class="status"
                              th:classappend="${'status-' + #strings.toLowerCase(log.visaEventType.name())}"
                              th:text="${log.visaEventType}">CREATED</span>
                    </td>
                    <td th:text="${log.description}">Visa application submitted.</td>
                </tr>
                </tbody>
            </table>

            <div th:if="${logs.totalElements == 0}" class="empty-state">
                No log entries match the current filters.
            </div>

            <!-- Pager. Each link re-emits the current filter state so narrowing
                 the result set and then paging through it keeps the filters. -->
            <div class="pager" th:if="${logs.totalPages > 1}">
                <a th:if="${!logs.first}"
                   th:href="@{/log/visa(page=${logs.number - 1}, size=${logs.size},
                                         eventType=${selectedEventType},
                                         from=${from != null ? #temporals.format(from, 'yyyy-MM-dd') : null},
                                         to=${to != null ? #temporals.format(to, 'yyyy-MM-dd') : null})}"
                   class="view-link">&larr; Previous</a>

                <span class="page-info"
                      th:text="'Page ' + (${logs.number} + 1) + ' of ' + ${logs.totalPages}">
                    Page 1 of 1
                </span>

                <a th:if="${!logs.last}"
                   th:href="@{/log/visa(page=${logs.number + 1}, size=${logs.size},
                                         eventType=${selectedEventType},
                                         from=${from != null ? #temporals.format(from, 'yyyy-MM-dd') : null},
                                         to=${to != null ? #temporals.format(to, 'yyyy-MM-dd') : null})}"
                   class="view-link">Next &rarr;</a>
            </div>
        </main>
    </div>
</div>

</body>
</html>
