<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Visa Application</title>
    <link rel="stylesheet" th:href="@{/css/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <style>
        .container { max-width: 500px; margin: 0 auto; }

        .container > header {
            display: block;
            text-align: left;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        .container > header p { color: var(--color-text-dim); font-size: 14px; margin-top: 5px; }

        /* Handler-feedback banner shown when a case is INCOMPLETE. */
        .feedback-banner {
            margin-bottom: 30px;
            padding: 20px;
            background: var(--color-warning-bg);
            border: 1px solid var(--color-warning-border);
            border-radius: var(--radius-md);
        }
        .feedback-banner .feedback-label {
            color: var(--color-warning-accent);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
        }
        .feedback-banner p {
            color: var(--color-text-secondary);
            margin: 0;
            font-style: italic;
        }

        /* Attached-document row on the edit form. */
        .document-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--color-surface-raised);
            padding: 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border-strong);
        }
        .document-row a {
            color: var(--color-text-primary);
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .document-row button {
            background: none;
            border: none;
            color: var(--color-danger);
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            padding: 0;
            width: auto;
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: nav}"></nav>

<div class="page-content">
<div class="container">
    <header>
        <h1>Edit Application</h1>
        <p>Updating case for <span th:text="${currentUser.fullName}">User</span></p>
    </header>

    <div th:if="${updateVisaDto != null && updateVisaDto.visaStatus != null && updateVisaDto.visaStatus.name() == 'INCOMPLETE'}"
         class="feedback-banner">
        <label class="feedback-label">Feedback from Handler</label>
        <p th:text="${statusInformation != null ? statusInformation : 'Please review and update your application details.'}">
            Reason for incomplete status goes here.
        </p>
    </div>

    <form th:action="@{/visa/{id}/edit(id=${updateVisaDto.id})}"
          th:object="${updateVisaDto}"
          method="post" enctype="multipart/form-data">

        <div th:if="${#fields.hasErrors('global')}" class="alert-error">
            <p style="margin: 0;" th:each="err : ${#fields.errors('global')}" th:text="${err}"></p>
        </div>

        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{visaStatus}" />
        <input type="hidden" th:field="*{handlerId}" />

        <div class="form-group">
            <label>Visa Type</label>
            <select th:field="*{visaType}" th:classappend="${#fields.hasErrors('visaType')} ? 'is-invalid' : ''">
                <option th:each="type : ${visaTypes}" th:value="${type}" th:text="${type}"></option>
            </select>
            <span class="error-text" th:if="${#fields.hasErrors('visaType')}" th:errors="*{visaType}"></span>
        </div>

        <div class="form-group">
            <label>Nationality</label>
            <input type="text" th:field="*{nationality}" th:classappend="${#fields.hasErrors('nationality')} ? 'is-invalid' : ''">
            <span class="error-text" th:if="${#fields.hasErrors('nationality')}" th:errors="*{nationality}"></span>
        </div>

        <div class="form-group">
            <label>Passport Number</label>
            <input type="text" th:field="*{passportNumber}" th:classappend="${#fields.hasErrors('passportNumber')} ? 'is-invalid' : ''">
            <span class="error-text" th:if="${#fields.hasErrors('passportNumber')}" th:errors="*{passportNumber}"></span>
        </div>

        <div class="form-group">
            <label>Expected Travel Date</label>
            <input type="date" th:field="*{travelDate}" th:classappend="${#fields.hasErrors('travelDate')} ? 'is-invalid' : ''">
            <span class="error-text" th:if="${#fields.hasErrors('travelDate')}" th:errors="*{travelDate}"></span>
        </div>

        <div class="form-group" th:if="${not #lists.isEmpty(visa.downloadUrls)}">
            <label>Current Passport Documents</label>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <div th:each="url, iter : ${visa.downloadUrls}" class="document-row">
                    <a th:href="${url}" target="_blank" rel="noopener noreferrer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span th:text="'View Attachment ' + ${iter.count}">View Attachment</span>
                    </a>

                    <button type="button" class="js-delete-doc"
                            th:attr="data-form-id='delete-doc-' + ${iter.index}">
                        &times;
                    </button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Add Passport Document</label>
            <div style="position: relative; border: 1px dashed var(--color-border-strong); background: var(--color-surface); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; gap: 15px;">

                <input type="file" name="passportFile" id="passportFile" accept="image/*,.pdf"
                       style="border: none; background: transparent; padding: 0; width: auto; margin: 0;">

                <span id="file-name" style="color: var(--color-text-primary); font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></span>
            </div>

            <p style="color: var(--color-text-dim); font-size: 11px; margin-top: 5px;">
                Supported Formats: PDF, JPG or PNG. (Max 10MB).
            </p>
        </div>

        <button type="submit" class="btn-submit">Save Changes</button>
        <a th:href="@{/visa/{id}(id=${updateVisaDto.id})}" class="cancel-link">Back to Details</a>
    </form>

    <div th:each="key, iter : ${visa.s3Keys}">
        <form th:id="'delete-doc-' + ${iter.index}"
              th:action="@{/visa/{id}/documents/delete(id=${visa.id})}"
              method="post" style="display: none;">
            <input type="hidden" name="s3Key" th:value="${key}">
        </form>
    </div>
</div>
</div>

<script>
    document.getElementById('passportFile').addEventListener('change', function() {
        const fileNameDisplay = document.getElementById('file-name');
        if (this.files && this.files.length > 0) {
            fileNameDisplay.textContent = '📎 Selected: ' + this.files[0].name;
        } else {
            fileNameDisplay.textContent = '';
        }
    });

    // Delegated handler for the per-document delete buttons. Reads the target
    // hidden form's id from data-form-id and submits it after a confirm prompt.
    document.querySelectorAll('.js-delete-doc').forEach(function(btn) {
        btn.addEventListener('click', function() {
            if (!confirm('Remove this document?')) return;
            const form = document.getElementById(btn.dataset.formId);
            if (form) form.submit();
        });
    });
</script>

</body>
</html>
