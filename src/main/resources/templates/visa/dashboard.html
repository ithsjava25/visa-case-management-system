<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Visa Dashboard</title>
    <style>
        /* Modern Minimalist CSS */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333; line-height: 1.6; background: #fff; margin: 0; padding: 40px; }

        .container { max-width: 900px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: baseline;
            border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 40px; }

        h1 { font-size: 24px; font-weight: 500; margin: 0; }

        .user-info { font-size: 14px; color: #666; }

        .btn-new { text-decoration: none; color: #000; border: 1px solid #000;
            padding: 8px 16px; font-size: 14px; border-radius: 4px; transition: 0.2s; }
        .btn-new:hover { background: #000; color: #fff; }

        /* Table Styling */
        table { width: 100%; border-spacing: 0; }
        th { text-align: left; font-size: 12px; text-transform: uppercase;
            letter-spacing: 1px; color: #999; padding: 10px 0; border-bottom: 1px solid #eee; }
        td { padding: 20px 0; border-bottom: 1px solid #f9f9f9; font-size: 15px; }

        /* Minimalist Status Indicators */
        .status { font-size: 12px; padding: 4px 8px; border-radius: 12px; background: #f0f0f0; }
        .status-granted { background: #e6f4ea; color: #1e7e34; }
        .status-rejected { background: #fce8e6; color: #d93025; }

        .view-link { color: #007bff; text-decoration: none; font-weight: 500; }
        .view-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Visa Overview</h1>
            <span class="user-info">Logged in as <span th:text="${currentUser.fullName}">User</span></span>
        </div>
        <a th:href="@{/visas/apply(currentUserId=${currentUser.id})}" class="btn-new">
            + New Application
        </a>
    </header>

    <main>
        <table>
            <thead>
            <tr>
                <th>Reference</th>
                <th>Visa Type</th>
                <th>Status</th>
                <th>Submitted</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="visa : ${visas}">
                <td th:text="'#' + ${visa.id}">#101</td>
                <td th:text="${visa.visaType}">STUDENT</td>
                <td>
                        <span class="status"
                              th:classappend="${visa.visaStatus.name() == 'GRANTED' ? 'status-granted' :
                                               (visa.visaStatus.name() == 'REJECTED' ? 'status-rejected' : '')}"
                              th:text="${visa.visaStatus}">
                            SUBMITTED
                        </span>
                </td>
                <td th:text="${#temporals.format(visa.createdAt, 'yyyy-MM-dd')}">Current date</td>
                <td style="text-align: right;">
                    <a th:href="@{/visas/{id}(id=${visa.id}, currentUserId=${currentUser.id})}" class="view-link">
                        Details →
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(visas)}" style="padding: 40px; text-align: center; color: #999;">
            No applications found.
        </div>
    </main>
</div>

</body>
</html>
