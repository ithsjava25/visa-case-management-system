<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Visa Dashboard</title>
    <style>
        /* Monokrom Dark Mode Palette */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f0f0f0; /* Ljusgrå text (inte kritvit) för bättre läsbarhet */
            line-height: 1.6;
            background: #000; /* Ren svart bakgrund */
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px;
            background: #111; /* Mycket mörkgrå, nästan svart, för kortet */
            border: 1px solid #222; /* Subtil ram */
            border-radius: 12px;
            box-shadow: 0 8px 16px -2px rgba(0, 0, 0, 0.6); /* Mörk skugga */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 24px;
            margin-bottom: 40px;
        }

        h1 { font-size: 24px; font-weight: 500; color: #fff; margin: 0; }

        .user-info { font-size: 14px; color: #888; }

        /* Buttons & Header Actions */
        .header-actions { display: flex; gap: 12px; }

        .btn-new {
            text-decoration: none;
            color: #fff;
            background: #222; /* Mörkgrå bas */
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s;
            border: 1px solid #333; /* Lite ljusare ram */
        }
        .btn-new:hover { background: #333; color: #fff; transform: translateY(-1px); }

        /* Sign out specifik stil för att göra den diskretare */
        .btn-signout {
            background: transparent;
            border: 1px solid #222;
            color: #888;
        }
        .btn-signout:hover {
            background: #181818;
            color: #ccc;
            border: 1px solid #333;
        }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #666;
            padding: 12px 16px;
            border-bottom: 1px solid #222;
        }
        td {
            padding: 16px;
            border-bottom: 1px solid #181818;
            font-size: 14px;
            color: #ccc;
            border-left: 2px solid transparent; /* Förbered en osynlig kant */
            transition: all 0.2s;
        }

        tr:hover td {
            background: rgba(30, 30, 30, 0.4);
        }

        /* Vid hover: ge den första cellen i raden en vit kant till vänster */
        tr:hover td:first-child {
            border-left: 2px solid #fff;
        }
        /* STATUS BADGES - Dina originalfärger anpassade för mörk bakgrund */
        .status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        /* Vi använder en svag bakgrundsfärg (20% opacitet) för att det ska se modernt ut mot svart */
        .status-submitted { background: rgba(25, 103, 210, 0.2); color: #8ab4f8; }
        .status-unassigned { background: rgba(95, 99, 104, 0.2); color: #bdc1c6; }
        .status-assigned { background: rgba(0, 97, 193, 0.2); color: #66b2ff; }
        .status-incomplete { background: rgba(176, 96, 0, 0.2); color: #fdd663; }
        .status-granted { background: rgba(30, 126, 52, 0.2); color: #81c995; }
        .status-rejected { background: rgba(217, 48, 37, 0.2); color: #f28b82; }

        .view-link { color: #fff; text-decoration: none; font-weight: 500; transition: 0.2s; }
        .view-link:hover { color: #888; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Visa Dashboard</h1>
            <span class="user-info">Logged in as: <span th:text="${currentUser.fullName}">User</span></span>
        </div>
        <div class="header-actions">
            <a th:if="${currentUser.userAuthorization.name() == 'USER'}"
               th:href="@{/visas/apply(currentUserId=${currentUser.id})}" class="btn-new">
                + New Application
            </a>
            <a th:href="@{/visas/logout}" class="btn-new "> Sign Out
            </a>
        </div>
    </header>

    <main>
        <table>
            <thead>
            <tr>
                <th>Reference</th>
                <th th:if="${currentUser.userAuthorization.name() != 'USER'}">Applicant</th>
                <th th:if="${currentUser.userAuthorization.name() != 'USER'}">Handler</th>
                <th>Visa Type</th>
                <th>Status</th>
                <th>Travel Date</th>
                <th>Last updated</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="visa : ${visas}">
                <td th:text="'# ' + ${visa.id}">#101</td>

                <td th:if="${currentUser.userAuthorization.name() != 'USER'}"
                    th:text="${visa.applicantName}">Anna Andersson</td>

                <td th:if="${currentUser.userAuthorization.name() != 'USER'}"
                    th:text="${visa.handlerName != null ? visa.handlerName : 'Unassigned'}">-</td>

                <td th:text="${visa.visaType}">STUDENT</td>
                <td>
                        <span class="status"
                              th:classappend="${'status-' + #strings.toLowerCase(visa.visaStatus)}"
                              th:text="${visa.visaStatus}">
                            SUBMITTED
                        </span>
                <td th:text="${#temporals.format(visa.travelDate, 'yyyy-MM-dd')}">2026-05-20</td>
                </td>
                <td th:text="${#temporals.format(visa.updatedAt, 'yyyy-MM-dd HH:mm')}">-</td>
                <td style="text-align: left;">
                    <a th:href="@{/visas/{id}(id=${visa.id}, currentUserId=${currentUser.id})}" class="view-link">
                        Details →
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(visas)}" style="padding: 40px; text-align: center; color: #999;">
            No applications found.
        </div>
    </main>
</div>

</body>
</html>
