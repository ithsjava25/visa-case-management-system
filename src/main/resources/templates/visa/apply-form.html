<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Visa Application</title>
    <style>
        /* Modern Dark Apply Form CSS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f0f0f0;
            line-height: 1.6;
            background: #000;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #111;
            padding: 32px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        header {
            border-bottom: 1px solid #222;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        h1 { font-size: 24px; font-weight: 500; color: #fff; margin: 0; }
        header p { color: #666; font-size: 14px; margin-top: 5px; }

        /* Form Elements */
        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
            color: #666;
            letter-spacing: 0.5px;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            background: #181818;
            border: 1px solid #333;
            border-radius: 6px;
            color: #ccc;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            -webkit-appearance: none;
            resize: none;
        }


        /* Fokus-effekt som matchar resten av systemet */
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #666;
            background: #1a1a1a;
            color: #fff;
        }

        /* Anpassning för placeholder-text */
        ::placeholder { color: #444; }

        .btn-submit {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover { background: #ccc; transform: translateY(-1px); }

        .cancel-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .cancel-link:hover { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>New Application</h1>
        <p>Logged in as <span th:text="${currentUser.fullName}">User</span></p>
    </header>

    <form th:action="@{/visas/apply(currentUserId=${currentUser.id})}" method="post">

        <div class="form-group">
            <label>Visa Type</label>
            <select name="visaType" required>
                <option value="" disabled selected>Select type...</option>
                <option th:each="type : ${visaTypes}"
                        th:value="${type}"
                        th:text="${type}">STUDENT</option>
            </select>
        </div>
        <div class="form-group">
            <label>Nationality</label>
            <input type="text" name="nationality" placeholder="e.g. Swedish" required>
        </div>

        <div class="form-group">
            <label>Passport Number</label>
            <input type="text" name="passportNumber" placeholder="e.g. AB123456" required>
        </div>

        <div class="form-group">
            <label>Expected Travel Date</label>
            <input type="date" name="travelDate" required>
        </div>

        <div class="form-group">
            <label>Notes / Documentation Reference</label>
            <textarea name="documentationReference" placeholder="e.g. Passport number or link to docs"></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Application</button>

        <a th:href="@{/visas/dashboard(currentUserId=${currentUser.id})}" class="cancel-link">Cancel</a>
    </form>
</div>

</body>
</html>
